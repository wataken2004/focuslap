<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- 背景：深い紺 -->
  <rect width="192" height="192" rx="40" fill="#0D2137"/>

  <!-- 水中の光のゆらぎ（薄い帯） -->
  <rect x="20" y="0" width="18" height="192" rx="9" fill="#1A4A6A" opacity="0.25"/>
  <rect x="68" y="0" width="10" height="192" rx="5" fill="#1A4A6A" opacity="0.18"/>
  <rect x="110" y="0" width="22" height="192" rx="11" fill="#1A4A6A" opacity="0.20"/>
  <rect x="158" y="0" width="12" height="192" rx="6" fill="#1A4A6A" opacity="0.15"/>

  <!-- 海底の砂 -->
  <rect x="0" y="162" width="192" height="30" rx="0" fill="#1C3A28" opacity="0.9"/>
  <ellipse cx="40"  cy="164" rx="22" ry="8" fill="#1A3322" opacity="0.7"/>
  <ellipse cx="110" cy="166" rx="30" ry="7" fill="#1A3322" opacity="0.6"/>
  <ellipse cx="168" cy="163" rx="18" ry="7" fill="#1A3322" opacity="0.7"/>

  <!-- 海草（左） -->
  <rect x="22" y="120" width="8" height="46" rx="4" fill="#1B5E3B" opacity="0.85"/>
  <rect x="18" y="110" width="8" height="28" rx="4" fill="#1B5E3B" opacity="0.7" transform="rotate(-12,22,120)"/>
  <rect x="26" y="108" width="8" height="26" rx="4" fill="#1B5E3B" opacity="0.7" transform="rotate(10,30,118)"/>

  <!-- 海草（右） -->
  <rect x="162" y="124" width="8" height="42" rx="4" fill="#1B5E3B" opacity="0.85"/>
  <rect x="158" y="114" width="8" height="26" rx="4" fill="#1B5E3B" opacity="0.7" transform="rotate(-10,162,124)"/>

  <!-- サンゴ -->
  <rect x="76" y="150" width="10" height="18" rx="5" fill="#2D6B4A" opacity="0.8"/>
  <rect x="70" y="142" width="8"  height="14" rx="4" fill="#2D6B4A" opacity="0.7"/>
  <rect x="84" y="144" width="8"  height="12" rx="4" fill="#2D6B4A" opacity="0.7"/>

  <!-- 魚の尾びれ（積み木ブロック） -->
  <rect x="34" y="70" width="20" height="56" rx="10" fill="#1A4D5C"/>

  <!-- 魚の胴体（積み木ブロック・メイン） -->
  <rect x="50" y="76" width="84" height="44" rx="14" fill="#1E6B72"/>

  <!-- 背びれ -->
  <rect x="68" y="58" width="40" height="22" rx="10" fill="#174A54"/>

  <!-- 腹びれ -->
  <rect x="72" y="116" width="28" height="14" rx="7" fill="#174A54"/>

  <!-- 鱗ライン（縦の切れ目） -->
  <rect x="72"  y="86" width="5" height="24" rx="3" fill="#174A54" opacity="0.55"/>
  <rect x="86"  y="86" width="5" height="24" rx="3" fill="#174A54" opacity="0.55"/>
  <rect x="100" y="86" width="5" height="24" rx="3" fill="#174A54" opacity="0.55"/>
  <rect x="114" y="86" width="5" height="24" rx="3" fill="#174A54" opacity="0.55"/>

  <!-- 目（積み木風：白い正方形＋黒い正方形） -->
  <rect x="118" y="88" width="14" height="14" rx="4" fill="#DDEEE8"/>
  <rect x="121" y="91" width="7"  height="7"  rx="2" fill="#0D2137"/>
  <!-- 目のハイライト -->
  <rect x="125" y="91" width="3"  height="3"  rx="1" fill="#DDEEE8" opacity="0.8"/>

  <!-- 口 -->
  <rect x="132" y="107" width="10" height="5" rx="3" fill="#174A54"/>

  <!-- 泡（小さい白い丸） -->
  <circle cx="152" cy="48" r="6" fill="#DDEEE8" opacity="0.25"/>
  <circle cx="164" cy="30" r="4" fill="#DDEEE8" opacity="0.18"/>
  <circle cx="144" cy="32" r="3" fill="#DDEEE8" opacity="0.15"/>
  <circle cx="158" cy="68" r="3" fill="#DDEEE8" opacity="0.20"/>
</svg>
