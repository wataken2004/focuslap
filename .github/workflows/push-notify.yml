name: push-notify

on:
  schedule:
    - cron: "*/5 * * * *"  # 5分ごと（GitHub側の混雑で数分遅れることあり）
  workflow_dispatch: {}     # 手動実行も可能

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install --no-save firebase-admin web-push
      - name: Send notifications
        run: node scripts/send-push.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      # リポジトリが60日間更新されないと定期実行が自動停止されるのを防ぐ
      # （公式APIでワークフローを再有効化して無効化タイマーをリセット）
      - name: Keepalive
        if: github.event_name == 'schedule'
        continue-on-error: true
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/push-notify.yml/enable"
